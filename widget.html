<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat Widget</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand: #2563eb;
    --brand-dark: #1d4ed8;
    --bg: #ffffff;
    --surface: #f8fafc;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-muted: #64748b;
    --user-bg: #2563eb;
    --user-text: #ffffff;
    --bot-bg: #f1f5f9;
    --bot-text: #1e293b;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,0.10);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }
  body.embed-panel {
    background: transparent;
    min-height: 100vh;
    padding: 0;
  }
  body.embed-inline {
    min-height: 100vh;
    padding: 0;
  }
  body.embed-panel #widget,
  body.embed-inline #widget {
    width: 100%;
    max-width: none;
    height: 100vh;
    border-radius: 0;
    box-shadow: none;
    border: 0;
  }

  /* ---------- widget shell ---------- */
  #widget {
    width: 100%;
    max-width: 420px;
    height: 600px;
    background: var(--bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---------- header ---------- */
  #header {
    background: var(--brand);
    color: #fff;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  #header-text { flex: 1; }
  #assistant-name { font-size: 15px; font-weight: 600; }
  #close-btn {
    display: none;
    width: 32px;
    height: 32px;
    border: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    color: #fff;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #close-btn:hover { background: rgba(255,255,255,0.28); }
  body.embed-panel #close-btn { display: inline-flex; }
  #status-line { font-size: 12px; opacity: 0.8; display: flex; align-items: center; gap: 5px; }
  #status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4ade80;
    transition: background 0.3s;
  }
  #status-dot.offline { background: #f87171; }
  #status-dot.connecting { background: #facc15; animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ---------- messages ---------- */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: fadeUp 0.2s ease;
  }
  .msg-row.user { flex-direction: row-reverse; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.55;
    word-break: break-word;
  }
  .bubble.bot  { background: var(--bot-bg); color: var(--bot-text); border-bottom-left-radius: 4px; }
  .bubble.user { background: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px; }

  /* Markdown inside bot bubbles */
  .bubble.bot p  { margin: 0 0 6px; }
  .bubble.bot p:last-child { margin-bottom: 0; }
  .bubble.bot ul, .bubble.bot ol { padding-left: 18px; margin: 4px 0; }
  .bubble.bot li { margin-bottom: 3px; }
  .bubble.bot a  { color: var(--brand); text-decoration: underline; }
  .bubble.bot strong { font-weight: 600; }
  .bubble.bot code {
    background: rgba(0,0,0,0.06);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12.5px;
    font-family: monospace;
  }

  /* Typing indicator */
  .typing-dots { display: flex; gap: 4px; padding: 4px 2px; align-items: center; }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* ---------- input bar ---------- */
  #input-bar {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #msg-input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 9px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 40px;
    max-height: 120px;
    line-height: 1.4;
    color: var(--text);
    background: var(--surface);
    transition: border-color 0.2s;
  }
  #msg-input:focus { border-color: var(--brand); background: #fff; }
  #msg-input::placeholder { color: var(--text-muted); }

  #send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--brand);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  #send-btn:hover  { background: var(--brand-dark); }
  #send-btn:active { transform: scale(0.93); }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; }
  #send-btn svg { width: 18px; height: 18px; fill: white; }

  /* ---------- error banner ---------- */
  #error-banner {
    display: none;
    background: #fef2f2;
    color: #b91c1c;
    font-size: 12px;
    padding: 6px 14px;
    border-top: 1px solid #fecaca;
    text-align: center;
  }
  @media (max-width: 640px) {
    body {
      min-height: 100dvh;
      padding: 0;
    }
    #widget {
      max-width: none;
      height: 100dvh;
      border-radius: 0;
      box-shadow: none;
      border: 0;
    }
  }
</style>
</head>
<body>

<div id="widget">
  <div id="header">
    <div id="avatar">🤖</div>
    <div id="header-text">
      <div id="assistant-name">Assistant</div>
      <div id="status-line">
        <span id="status-dot" class="connecting"></span>
        <span id="status-text">Connecting…</span>
      </div>
    </div>
    <button id="close-btn" type="button" aria-label="Close chat">x</button>
  </div>

  <div id="messages"></div>
  <div id="error-banner" role="alert"></div>

  <div id="input-bar">
    <textarea id="msg-input" placeholder="Type a message…" rows="1" disabled></textarea>
    <button id="send-btn" disabled aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- Simple Markdown renderer (no external deps) -->
<script>
// ------------------------------------------------------------------ //
//  CONFIG — edit these to match your backend
// ------------------------------------------------------------------ //
const params = new URLSearchParams(window.location.search);
const BACKEND_HTTP = params.get("backend_http") || "https://ai-chatbot-mvp-production.up.railway.app";
const BACKEND_WS   = params.get("backend_ws") || "wss://ai-chatbot-mvp-production.up.railway.app";
const SITE_ID      = params.get("site_id") || "marketing-site";
const EMBED_MODE   = params.get("mode") || "standalone";

if (EMBED_MODE === "panel") document.body.classList.add("embed-panel");
if (EMBED_MODE === "inline") document.body.classList.add("embed-inline");

// ------------------------------------------------------------------ //
//  State
// ------------------------------------------------------------------ //
let ws        = null;
let threadId  = crypto.randomUUID();
let retries   = 0;
const MAX_RETRIES = 5;

// ------------------------------------------------------------------ //
//  DOM refs
// ------------------------------------------------------------------ //
const $messages  = document.getElementById("messages");
const $input     = document.getElementById("msg-input");
const $sendBtn   = document.getElementById("send-btn");
const $name      = document.getElementById("assistant-name");
const $avatar    = document.getElementById("avatar");
const $dot       = document.getElementById("status-dot");
const $statusTxt = document.getElementById("status-text");
const $err       = document.getElementById("error-banner");
const $closeBtn  = document.getElementById("close-btn");

// ------------------------------------------------------------------ //
//  Minimal Markdown → HTML
// ------------------------------------------------------------------ //
function renderMarkdown(md) {
  if (!md) return "";
  let html = md
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    // Bold / italic
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    // Inline code
    .replace(/`([^`]+)`/g,"<code>$1</code>")
    // Links
    .replace(/\[(.+?)\]\((https?:\/\/[^\)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    // Unordered list items
    .replace(/^[ \t]*[-*]\s+(.+)$/gm,"<li>$1</li>")
    // Wrap consecutive <li> in <ul>
    .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    // Line breaks → paragraphs
    .split(/\n\n+/)
    .map(p => p.trim() ? (p.startsWith("<ul>") ? p : `<p>${p.replace(/\n/g,"<br>")}</p>`) : "")
    .join("\n");
  return html;
}

// ------------------------------------------------------------------ //
//  UI helpers
// ------------------------------------------------------------------ //
function applyTheme(theme) {
  if (!theme) return;
  const root = document.documentElement;
  if (theme.brand_color) root.style.setProperty("--brand", theme.brand_color);
  if (theme.brand_color_dark) root.style.setProperty("--brand-dark", theme.brand_color_dark);
  if (theme.surface_color) root.style.setProperty("--surface", theme.surface_color);
  if (theme.bot_bubble_color) root.style.setProperty("--bot-bg", theme.bot_bubble_color);
  if (theme.user_bubble_color) root.style.setProperty("--user-bg", theme.user_bubble_color);
  if (theme.avatar_text) $avatar.textContent = theme.avatar_text;
}

function setStatus(state, text) {
  $dot.className = state;        // "connecting" | "online" | "offline"
  $statusTxt.textContent = text;
}

function setInputEnabled(enabled) {
  $input.disabled  = !enabled;
  $sendBtn.disabled = !enabled;
  if (enabled) $input.focus();
}

function showError(msg) {
  $err.textContent = msg;
  $err.style.display = "block";
  setTimeout(() => { $err.style.display = "none"; }, 5000);
}

function appendMessage(role, markdownText) {
  // Remove typing indicator if present
  const typing = document.getElementById("typing-indicator");
  if (typing) typing.remove();

  const row = document.createElement("div");
  row.className = `msg-row ${role}`;

  const bubble = document.createElement("div");
  bubble.className = `bubble ${role}`;

  if (role === "bot") {
    bubble.innerHTML = renderMarkdown(markdownText);
  } else {
    bubble.textContent = markdownText;
  }

  row.appendChild(bubble);
  $messages.appendChild(row);
  $messages.scrollTop = $messages.scrollHeight;
}

function showTyping() {
  const row = document.createElement("div");
  row.className = "msg-row bot";
  row.id = "typing-indicator";
  row.innerHTML = `<div class="bubble bot"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  $messages.appendChild(row);
  $messages.scrollTop = $messages.scrollHeight;
}

// ------------------------------------------------------------------ //
//  Step 1 — fetch widget config + token, then open WebSocket
// ------------------------------------------------------------------ //
async function init() {
  setStatus("connecting", "Connecting…");

  try {
    // Fetch brand config
    const cfgRes = await fetch(`${BACKEND_HTTP}/api/v1/widget-config?site_id=${SITE_ID}`);
    if (!cfgRes.ok) throw new Error(`Config fetch failed: ${cfgRes.status}`);
    const cfg = await cfgRes.json();
    $name.textContent = cfg.assistantTitle || cfg.brandName || "Assistant";
    applyTheme(cfg.theme);

    // Fetch JWT token
    const tokRes = await fetch(
      `${BACKEND_HTTP}/api/v1/token?site_id=${SITE_ID}`,
      { method: "POST" }
    );
    if (!tokRes.ok) throw new Error(`Token fetch failed: ${tokRes.status}`);
    const { token } = await tokRes.json();

    connectWebSocket(token);

  } catch (err) {
    setStatus("offline", "Connection failed");
    showError(`Could not connect to backend: ${err.message}`);
    console.error("Widget init error:", err);
  }
}

// ------------------------------------------------------------------ //
//  Step 2 — WebSocket connection with auto-reconnect
// ------------------------------------------------------------------ //
function connectWebSocket(token) {
  const url = `${BACKEND_WS}/api/v1/ws/${threadId}?token=${token}`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    retries = 0;
    setStatus("connecting", "Loading…");
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === "welcome") {
      setStatus("online", "Online");
      setInputEnabled(true);
      appendMessage("bot", data.reply_markdown);
    }

    if (data.type === "typing") {
      showTyping();
    }

    if (data.type === "reply") {
      appendMessage("bot", data.reply_markdown);
    }
  };

  ws.onerror = () => {
    setStatus("offline", "Error");
  };

  ws.onclose = (event) => {
    setInputEnabled(false);
    if (retries < MAX_RETRIES) {
      const delay = Math.min(1000 * 2 ** retries, 15000);
      retries++;
      setStatus("connecting", `Reconnecting (${retries}/${MAX_RETRIES})…`);
      setTimeout(() => init(), delay);
    } else {
      setStatus("offline", "Disconnected");
      showError("Connection lost. Please refresh the page.");
    }
  };
}

// ------------------------------------------------------------------ //
//  Step 3 — Send message
// ------------------------------------------------------------------ //
function sendMessage() {
  const text = $input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  appendMessage("user", text);
  ws.send(JSON.stringify({ message: text }));
  $input.value = "";
  $input.style.height = "auto";
}

// ------------------------------------------------------------------ //
//  Event listeners
// ------------------------------------------------------------------ //
$sendBtn.addEventListener("click", sendMessage);

$closeBtn.addEventListener("click", () => {
  if (ws && ws.readyState === WebSocket.OPEN) ws.close();
  if (window.parent !== window) {
    window.parent.postMessage({ type: "chatbot:close" }, "*");
  }
});

$input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
$input.addEventListener("input", () => {
  $input.style.height = "auto";
  $input.style.height = Math.min($input.scrollHeight, 120) + "px";
});

// ------------------------------------------------------------------ //
//  Boot
// ------------------------------------------------------------------ //
init();
</script>
</body>
</html>
